          base64 -d /tmp/yt.b64 > /tmp/yt.tar.gz
          tar xzf /tmp/yt.tar.gz -C .
          ls -R youtube_search

      - name: Download Gradle 8.7 and generate wrapper
        run: |
          curl -sSL https://services.gradle.org/distributions/gradle-8.7-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt
          cd youtube_search
          /opt/gradle-8.7/bin/gradle wrapper --gradle-version 8.7 --distribution-type bin

      - name: Commit youtube_search to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add youtube_search
          git commit -m "Add youtube_search Android project [skip ci]" || echo "Nothing to commit"
          git push

      - name: Stage 2 - Build APK
        run: |
          cd youtube_search
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: youtube-search-apk
          path: youtube_search/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
